name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  quality:
    name: Lint, Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint
        
      - name: Unit Tests (Vitest)
        run: npm run test

      - name: Build (Next.js Production)
        env:
          NEXT_PUBLIC_SUPABASE_URL: "https://dummy.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.dummy"
          SUPABASE_SERVICE_ROLE_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.dummy-service"
          ANTHROPIC_API_KEY: "sk-ant-dummy-key-for-ci"
          RESEND_API_KEY: "re_dummy_key_for_ci"
          NEXT_PUBLIC_APP_URL: "https://trim-ai.vercel.app"
        run: npm run build
